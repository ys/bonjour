<div class="font-sans mx-auto px-6 w-full max-w-6xl">
  <footer class="pt-10 pb-14 flex flex-col items-center gap-4 text-center">
    <p class="font-serif italic text-sm text-gray-500 dark:text-gray-400 max-w-sm leading-relaxed">
      {{ .Site.Params.footerDescription }}
    </p>
    <div class="flex items-center text-[11px] tracking-[.1em] uppercase text-gray-500 dark:text-gray-400">
      <a href="mailto:{{ .Site.Params.social.email }}" class="hover:text-crust dark:hover:text-white transition-colors">email</a>
      <span class="px-3 text-gray-300 dark:text-gray-600">·</span>
      <a href="https://instagram.com/{{ .Site.Params.social.instagram }}" class="hover:text-crust dark:hover:text-white transition-colors">instagram</a>
      <span class="px-3 text-gray-300 dark:text-gray-600">·</span>
      <a href="/index.xml" class="hover:text-crust dark:hover:text-white transition-colors">rss</a>
    </div>
    <div class="flex items-center text-[11px] text-gray-400 dark:text-gray-500 tracking-[.04em]">
      <span>{{ .Site.Params.author.location }}</span>
      <span class="px-2">·</span>
      <span>{{ .Site.Params.copyright }}</span>
    </div>
    <a href="#" aria-label="Back to top" class="mt-4 w-7 block text-gray-300 dark:text-gray-700 hover:text-gray-400 hover:rotate-180 transition-all duration-500">
      {{ if fileExists "/static/negative-logo.svg" }}
        {{ readFile "/static/negative-logo.svg" | safeHTML }}
      {{ end }}
    </a>
  </footer>
</div>
