    weeks at a time deep in the California wilderness in search of Desert Big Horn
    Sheep. For a man who has spent his life doing tricks in the air, hunting is now
    the way he stays grounded and finds the inner peace to live happy. \n\nSubscribe
    to the YETI YouTube Channel to be the first to see our new videos: http://bit.ly/YETI-Subscribe\n\nDirector:
