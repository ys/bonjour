  - text: We can just say “no thanks” to technology if it doesn’t make sense to us.
      New is not inevitable. New doesn’t mean need.
    note: ''
    created: '2024-05-16T08:55:47.295Z'
    lastUpdate: '2024-05-16T08:56:09.190Z'
