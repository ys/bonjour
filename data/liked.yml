- _id: 797114459
  link: https://soundcloud.com/inside-eurosima-podcast/damien-marly-et-julie-pollet-le-chipiron-a-la-landaise
  title: Julie Pollet et Damien Marly, le Chipiron à la Landaise by Inside Eurosima
    Podcast
  excerpt: "Episode  #14 (Français/French). Enregistré à Hossegor le 26 juin 2023.\n\n(English
    version below)\n\nInvités : Julie Pollet et Damien Marly, fondateurs de Chipiron\n\nChipiron.
    Un mot propre au Sud-Ouest qui, depuis quelques années, évoque davantage chez
    les surfeurs la petite marque qui monte que le calamar en vogue dans les restaurants
    des environs.\n\n\LEn moins de quinze ans, Damien Marly, vite rejoint dans l’aventure
    par Julie Pollet, sa partenaire à la ville et à la plage, a su développer un business
    à 360 degrés dépassant largement le shape de planches : surfwear, accessoires,
    magasins ou encore école de surf. Chipiron est devenu une entité incontournable
    du côté d’Hossegor et de Soorts. Et les ambitions portées par la marque ne s’arrêtent
    pas là.\n\n\LA notre micro, Damien et Julie racontent leurs parcours respectifs
    - notamment quelques années chez Rip Curl pour elle, et chez Rhythm entre autres
    pour lui - puis l’aventure entrepreneuriale qu’ils développent désormais à deux,
    forts de ces précédentes expériences. Un business qu’ils incarnent à travers leur
    propre image et celle de leur surf family, et qui leur a permis de créer un univers
    et une identité à part entière notamment sur les réseaux sociaux.\n\n\LL’épisode
    est aussi l’occasion de parler shape, apprentissage, évolution des tendances et
    production, ou encore gestion d’une école de surf, du dossier de candidature à
    la gestion des inscriptions en passant par celle du staff.\n\n\LTous deux abordent
    également les difficultés à gérer une entreprise en plein développement - stratégie,
    ressources humaines, organisation, stocks, distribution... - et à concilier toutes
    ces activités.\n\n\LUn nouvel épisode riche en informations et en partage d’expériences,
    et donc très instructif. Bonne écoute.\n\nProduction éditoriale : EUROSIMA\L\nAnimation :
    Romain Ferrand / Rémi Chaussemiche\n\LRéalisation technique : Fred de Bailliencourt
    \n(Impact Zone Surf Podcast)\L\nPhoto : Stéphane Robin\n\nSuivez Inside Eurosima
    sur Instagram, Facebook et Linkedin. \n\nRetrouvez nos podcasts sur Insideurosima.com
    et sur Apple Podcasts, SoundCloud, Spotify, Google Podcasts et Deezer.\n\n///
    English \\\\\\\n\nChipiron: The quintessential spirit of the Landes\n\nChipiron.
    The word embodies the French “Sud-Ouest” though for the past few years it has
    come to refer to the surfers of an up and coming brand rather than the famous
    squid dish served in local restaurants. \n\nIn just under fifteen years, Damien
    Marly and Julie Pollet - his partner in the water and on the beach - have succeeded
    in developing a 360 degree business that spans well beyond just shaping surfboards.
    \ It encompasses surfwear, accessories, shops and even a surf school. Chipiron
    has indeed become a landmark in the Hossegor and Soorts area and the little brand's
    ambition is far from ready to stop there. \n\nDamien and Julie joined us to talk
    about their own individual paths - a few years at Rip Curl for Julie while Damien
    was at Rhythm -  and how their experience led them to the adventure of becoming
    entrepreneurs. Their business is a representation of who they are as individuals
    and as a surfing family and has helped them create a unique world and identity,
    namely on social networks. \n\nThis episode will also be a great opportunity to
    discuss shaping, from learning how to shape to the evolutions and trends in production
    but also the ins and outs of running a surf school from how to prepare an application
    to staff management and registrations. \n\nThe duo are fully transparent and discuss
    the various challenges of managing a growing business: strategy, human resources,
    organization, stock management, retail...and how to handle all these activities
    at once.\n\nA new episode that is jam-packed with personal experience and is both
    highly informative and instructive.\n\nEnjoy the ride. \n\nListen to all our episodes
    on Insideurosima.com and Apple Podcasts, SoundCloud, Google Podcasts, Spotify
    and Deezer."
  note: A really nice success story that breaks some of the classical codes
