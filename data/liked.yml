- _id: 856050362
  link: https://www.youtube.com/watch?v=_usvQvtJMLE
  title: Frank Carter and The Rattlesnakes - Hellfest 2024 – ARTE Concert
  excerpt: "#FRANKCARTER #FRANKCARTERANDTHERATTLESNAKES\n\n\U0001F1EB\U0001F1F7  Le
    mariage entre @andtherattlesnakes  a vite été consommé : l’album Blossom a été
    publié quelques mois seulement après leur rencontre. Vite fait ne veut pas dire
    pour autant mal fait : on découvrait grâce à ce premier opus un Frank Carter au
    sommet de son art. Cette maîtrise permet au Britannique d’osciller entre rage
    et mélodie, et s’offrir même des pas de côté tirant vers la balade et le blues.\n\nSuite
    à ces débuts fracassants, Frank Carter & The Rattlesnakes ont publié quatre albums
    : Modern Ruin (2017), End of Suffering (2019), Sticky (2021) et Dark Rainbow (2024).
    Un album presque tous les deux ans, voilà un groupe réglé comme du papier à musique…
    mais une musique qui tape !\n\nEntouré des Rattlesnakes, Frank Carter prend plaisir
    à jouer une musique sauvage. Avec une voix et des instruments poussés à l’extrême,
    l’ancien membre de Gallows et de Pure Love délivre une énergie dingue sur scène,
    comme si chacune était la dernière. Ce concert au Hellfest ne fait pas exception.\n\nFilmé
    le 30 juin 2024 au Hellfest Open Air Festival, Clisson.\n\n____________ \n\n\U0001F1E9\U0001F1EA
    Aus der Verbindung von Frank Carter und The Rattlesnakes ging bereits wenige Monate
    nach ihrer ersten Begegnung das Album „Blossom“ hervor. Doch schnell und gut gemacht
    schließen einander nicht aus: Frank Carter zeigt sich hier auf dem Höhepunkt seines
    Schaffens: Die Musik des Briten schwankt zwischen rabiat und melodisch, mit dem
    einen oder anderen Abstecher hin zu Balladen oder Blues-Stücken.\n\nSeit ihrem
    fulminanten Debüt haben Frank Carter & The Rattlesnakes vier weitere Alben veröffentlicht:
    „Modern Ruin“(2017), „End of Suffering“ (2019), „Sticky“ (2021) und „Dark Rainbow“
    (2024). Alle zwei Jahre ein neues Album, das ist schon fast getaktet wie ein Uhrwerk.
    Die Stunden aber schlägt stets der Punk.\n\nIn Begleitung der Rattlesnakes lässt
    Frank Carter es auf der Bühne so richtig krachen. Das ehemalige Bandmitglied von
    Gallows und Pure Love holt das Äußerste aus seiner Stimme und den Instrumenten
    heraus. Er entfaltet eine Energie, als wäre jeder Auftritt sein letzter – dieses
    Konzert auf dem Hellfest macht da keine Ausnahme.\n\nAufzeichnung vom 30. Juni
    2024 beim Hellfest Open Air Festival, Clisson\n____________ \n\n[AVAILABLE UNTIL
    29/06/2025]\n\nMore concerts on our website: https://www.arteconcert.com \nYou
    can also find us on: \nFacebook: https://www.facebook.com/ARTEConcert/ \nTwitter:
    https://twitter.com/ARTEconcertFR \nInstagram FR: https://www.instagram.com/arteconcertfr/
    \nInstagram DE: https://www.instagram.com/arteconcertde/"
  note: What a treat!
