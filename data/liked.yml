- _id: 913075396
  link: https://www.youtube.com/watch?v=MbF5dyU96CE
  title: 4 Small Habits To Improve Self Esteem
  excerpt: "Self esteem is defined as the degree to which qualities and characteristics
    inside one’s self-concept are perceived to be positive. In short, it is your opinion
    of yourself. \n\nSo why is this important? There will be moments that will knock
    you down and make you give up. They will create doubt and leave you feeling insecure
    and unmotivated. You may feel like all your ambitions and goals are pointless.
    But, when you stop believing in yourself, it’s over. Your self-esteem plays a
    role in your future success. So much so that if you stop believing in yourself,
    it will be difficult for you to achieve your goals. So here are a few sma;; habits
    to improve self esteem.\n\nAlso, Watch This If You're Struggling With Your Self-Worth:
    https://youtu.be/yi5E5a2Ky7k\n\nWriter: Sara Del Villar \nScript Editor: Vanessa
    Tao & Dawn Tan \nScript Manager: Kelly Soong \nVO:  Amanda Silvera (www.youtube.com/amandasilvera)\nAnimator:
    Jou Kichi (new animator)\nYouTube Manager: Cindy Cheong    \n\nReferences:\nMayo
    Clinic Staff. (2020, July 14). 7 steps to boost your self-esteem. Mayo Clinic.
    Retrieved from www.mayoclinic.org/healthy-lifestyle/adult-health/in-depth/self-esteem/art-20045374.
    \nReach out Staff. (2021). 10 tips for improving your self-esteem. 10 tips for
    improving your self-esteem | Confidence | ReachOut Australia. Retrieved from au.reachout.com/articles/10-tips-for-improving-your-self-esteem.\nSteph.
    (2021, October 17). 5 Ways to Improve Low Self Esteem. @selfcarevisuals. Retrieved
    from www.instagram.com/. \nWinch, G. (2017, January 10). 5 ways to build lasting
    self-esteem. ideas.ted.com. Retrieved from ideas.ted.com/5-ways-to-build-lasting-self-esteem/."
  note: Always good to remember and focus on what matters. Baby steps
