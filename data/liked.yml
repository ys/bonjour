    my Patreon community at:\nhttps://www.patreon.com/lancehedrick\n\nFind me on IG
    at:\nhttps://www.instagram.com/lancehedrick\n\nFind me on Facebook at: \nhttps://www.facebook.com/lancehedrickcoffee\n\nMy
    storefront: https://www.amazon.com/shop/lancehedrick\n__________________\n\nThis
    article has both the WBC standards for heat test PLUS bonus responses to questions
