  highlights:
  - text: Detach from the expectations of the internet. Take your time with projects
      because you owe it to yourself to make something original to you. There is no
      rush.
    note: ''
    created: '2023-10-20T20:36:54.640Z'
    lastUpdate: '2023-10-20T20:38:14.039Z'
