- _id: 827318367
  link: https://www.youtube.com/watch?v=OwDwqMT1SKE
  title: Au Maroc, surfeurs et artistes face à l'insta-gentrification | Tracks | ARTE
  excerpt: "Comment résister à la vague de la gentrification touristique… quand on
    l’a provoquée ?\nImsouane, petit village de pêcheurs situé au sud-ouest du Maroc,
    est une destination de plus en plus prisée des touristes. Outre de magnifiques
    paysages très “instagrammables”, elle abrite le spot des vagues, parmi les plus
    longues des côtes d’Afrique, qui attirent les surfeurs venus du monde entier.
    Sous l’impulsion du gouvernement marocain, la ville se transforme pour les accueillir.
    Les bulldozers s’affairent et on efface des décennies d'histoire locale pour bâtir
    des projets immobiliers.\nUn bouleversement pour les habitants de Imsouane qui
    craignent que leur ville devienne une zone de tourisme de masse. Face à ces évènements,
    une résistance s’organise. Les surfeurs locaux, conscients que la culture globale
    du surf a causé cette gentrification, s’impliquent dans un mouvement de protestation.
    À leurs côtés, se mobilisent des artistes qui filment, photographient et utilisent
    leurs réseaux sociaux pour sensibiliser sur la disparition de l’Imsouane authentique.
    Tracks est parti à leur rencontre.\r\n\r\n\r\U0001F39E️ Ilias El Faris :  https://www.instagram.com/iliaselfaris\n\U0001F3C4\U0001F3FD‍♂️
    Hamza :  https://www.instagram.com/skululu__ \n\U0001F4F7 Youssef Boudlal :  https://www.instagram.com/youssefboudlal
    \n\n00:00 Introduction\n01:38 Dénoncer l'effacement de l'Imsouane historique\n07:20
    Défendre une expérience non formatée du surf\n11:27 Garder des traces de l’identité
    locale\n\n#imsouane #surf #arte\n\nhttps://www.arte.tv/fr/videos/119473-010-A/tracks/
    \n\nRetrouvez Tracks Instagram : \nhttps://instagram.com/ARTEtracks"
  note: |-
    > They destroyed the village, not the wave

    I really hope that Imsouane will be a leading example of how Moroccans could keep the hand on the local spot and move forward. Support local people over gentrification there.
