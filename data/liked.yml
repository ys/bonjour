- _id: 764281782
  link: https://www.youtube.com/watch?v=El2t7jyzjJY
  title: L'AUTO-COMPASSION avec Frédéric Lopez
  excerpt: "Pour débuter cette nouvelle saison de podcast, je voulais y inviter l'homme
    qui pourrait clairement être mon guide spirituel. \n\nCréateur et présentateur
    historique de « Rendez-vous en Terre Inconnue » il adoucie désormais nos week-ends
    dans « Un Dimanche à la Campagne » qu’il anime sur France 2. \n\nC’est à cette
    occasion que j’ai eu la chance de le rencontrer, tandis que je traversais une
    période d’ultra vulnérabilité. \n\nNon y avons passé 48h hors du temps.\n\nAvons
    pris le temps de s’abandonner à des discussions sans fin hors caméra.\n\nJe suis
    revenue de ce tournage et de nos échanges chamboulée. Quelque chose s’était passé.
    Comme une petite renaissance.\n\nCertaines lectures sont d’excellents médicaments,
    et je crois que certaines personnes peuvent l’être aussi. Et selon moi, Frédéric
    as ce pouvoir là.\n\nAlors aujourd'hui, je suis ravie de vous le présenter à travers
    mon regard et ma sensibilité.\n\nEt j'espère qu'il vous fera le même effet :)\n\nSee
    you le mois prochain pour le prochain épisode !\nPrenez soin de vous,\n\nLaury\n\nCREDITS
    : \n\nProduction : Laury Thilleman\nRéalisation : Jorys Lamothe\nPrise de son
    : Atelier ENL\nScénographie : Etienne Renollet\nMusique : Mako\n\nUn grand merci
    au studio FRENCH THEORY pour l'accueil chaleureux."
  note: |-
    Self compassion, mindfulness & other topics. Made me smile, made me want to cry.
    Qui aurait cru que je regarderais un podcast par une ancienne miss France.
