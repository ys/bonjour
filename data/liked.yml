- _id: 764270611
  link: https://www.youtube.com/watch?v=XEYuOGI5zx8
  title: Réapprendre à s'aimer
  excerpt: "Bonjour Youtube :) \nAlors moi c'est Laury, j'ai 32 ans et il y a 3 ans
    j'ai lancé un podcast dans lequel je me questionne sur mes failles et mes vulnérabilités.\nEt
    justement, il y a quelques mois, mon corps, mon coeur et ma tête m'ont crié STOP
    !\n\nJ'ai donc eu besoin de mettre toute ma vie sur pause. Et cette émission a
    été la première à sauter car il m'était devenu difficile de vous donner des pistes
    pour avancer dans la vie quand j'avais le sentiment de m'y noyer. \nAlors j’ai
    préféré pendant un temps vivre les choses, plutôt que les dire. J’avais besoin
    de comprendre, d’infuser et de déconstruire pour mieux reconstruire...\nBesoin
    de m’autoriser cette pause nécessaire pour mieux accueillir, cette transformation.\n\nAlors
    pour débuter cette nouvelle saison j'avais envie de faire les choses différemment...
    et d'ouvrir ce podcast à la vidéo (comme beaucoup me l'avez réclamé :) \n\nVoici
    l'épisode 0, dans lequel je vous en dis un peu plus sur ce qui a motivé ce retour.
    \n\nAlors d’avance merci pour votre indulgence et bon visionnage !\n\nPour les
    prochains épisodes, je vous donne rendez-vous tous les 1er du mois. \n\nAlors
    see you le 1er avril avec un invité plus que spécial :) \n\nEt si vous voulez
    être au taquet pour chaque sortie, n’hésitez pas à vous abonner sur l’appli de
    votre choix, ou à me suivre sur Instagram. Vous pouvez également me retrouver
    en librairie, avec mes méthodes Au TOP ! : Tonic Organic Positive.\n\n\nEcrit
    & Produit : Laury Thilleman\nRéalisation : Jorys Lamothe"
  note: Des images de surf, de l'amour de soi, cela marche bien sur moi.
