    ‘punk rock garden’, to Paul Joske’s open-minded surf quiver, Heath’s folks have
    had a huge influence on his life today, which is spent evenly between the garden
    and the waves. This Farm Boys origin story travels back to Heath’s hometown of
    Valla, to see where it all began.\n\nSubscribe to the series on Roaring Journals:
    https://www.patagonia.com.au/farmboys\n\n0:00    Heath's family inspiration\n1:26
