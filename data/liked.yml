  link: https://www.instagram.com/p/DES-ElBtr9X/
  title: 'Félix Lesouef on Instagram: "Surf & Turf – a South African road trip With
    @el.druido , we’ve known each other since we were two years old. Our first taste
    for exploration and travel came from a video game called Les aventures de l’Oncle
    Ernest, which we used to play on the old family computer back in the day. Then,
    about a decade ago, we planned our first real adventure: hitchhiking across Europe
    and writing our daily stories in a little blue notebook we still cherish. Later
    on, surfing entered our lives, and we were hooked! From day trips in Bretagne
    and Île de Ré to exploring the Caribbean and cruising along the coastlines of
    Europe and California, we documented every journey. It started with writing, then
    photography (mostly thanks to @el.druido), and now we’re diving into video. Earlier
    this year, Arthur (aka @el.druido) moved to South Africa to work in a winery,
    and that’s when the idea of making a surf movie for our friends and family really
    took shape—to bring everyone along ...'
  excerpt: '164 likes, 24 comments - felixlesouef on January 1, 2025: "Surf & Turf
    – a South African road trip  With @el.druido , we’ve known each other since we
    were two years old. Our first taste for exploration and travel came from a video
    game called Les aventures de l’Oncle Ernest, which we used to play on the old
    family computer back in the day. Then, about a decade ago, we planned our first
    real adventure: hitchhiking across Europe and writing our daily stories in a little
    blue notebook we still cherish.  Later on, surfing entered our lives, and we were
    hooked! From day trips in Bretagne and Île de Ré to exploring the Caribbean and
    cruising along the coastlines of Europe and California, we documented every journey.
    It started with writing, then photography (mostly thanks to @el.druido), and now
    we’re diving into video.  Earlier this year, Arthur (aka @el.druido) moved to
    South Africa to work in a winery, and that’s when the idea of making a surf movie
    for our friends and family really took shape—to bring everyone along for the ride
    and share our vision of a surf adventure.  As the year draws to a close, we’ve
    been spending precious time with friends and family. After showing them the final
    version, we want to thank everyone for their positive feedback, which encouraged
    us to share the film with the rest of the world.  So here we are! We’ll probably
    be posting it this month, and we can’t wait to show you what this incredible journey
    looks like. Stay tuned for more in the coming weeks!".'
  note: 'An amazing friendship story '
