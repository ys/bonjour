  link: https://www.youtube.com/watch?v=WM2KPVQZgiE
  title: 'NEVER TOO SMALL: Interior Designer’s Custom Built Plywood Apartment, Paris
    32sqm/344sqft'
  excerpt: "We’ve made a magazine! Subscribe now to get it first (and with free shipping)
    https://www.nevertoosmall.com/magazine\n\nOnce a fabric store in a 19th-century
    building, the home of Paris-based interior and product designer Adrien Dupuy is
    a compact, functional living space inspired by van life and his travels. Dupuy
    completely stripped the apartment, creating a 100% plywood joinery unit that cleverly
    houses the kitchen, bathroom, and mezzanine bedroom. The design maximizes every
    inch of space, with thoughtful details tailored to his lifestyle, including designated
    spots for his motorcycle helmets. Dupuy carefully selected a few designer furniture
    and lighting pieces to keep the apartment easy to clean, opting for a refurbished
    coffee table with a yellow glass top that matches the shower and California blinds
    for their '70s motel vibe.\n \n#smallapartment #architecture #interiordesign \n\nEp
    188\nProject Name: Tiny Belville \nInterior Designer:  www.adriendupuy.com\n\nProduced
    by New Mac Video Agency\nCreator: Colin Chee\nDirector: Nam Tran\nCinematographer:
    Matthieu Torres\nProducer: Lindsay Barnard\nEditor: Jessica Ruasol\nMusic: Sometimes
    by warmkeys., Sunday by Kitano & I Feel You by mee from Artlist.io\nPromo: Drum
    Circle by Sage Oursler and Keep Coming Back To The Start (Instrumental Version)
    by Duplex Heart from Epidemic Sound"
  note: Plywood appartments are the best
