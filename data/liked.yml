    \n\nWould you like to advertise with us, direct business inquiries to: blewis@spacestation.com
    \n\nABOUT THE SPIRITED MAN:\nThe Spirited Man is an unlimited series about the
    spirited man or woman who lives inside all of us (and fixing things).\n\nABOUT
    VAN NEISTAT:\nA pioneer in digital filmmaking, Van Neistat made his first internet
    video, The Holland Tunnel, in 2000. He went on to collaborate with New York City
    artist Tom Sachs, directing a series of short films shown at the Guggenheim Museum
